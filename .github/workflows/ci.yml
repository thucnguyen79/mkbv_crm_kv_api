name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U crm"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://crm:crm@localhost:5432/crm_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci-access-secret-must-be-32-chars-len
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-32-chars-len
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Prisma generate + migrate
        working-directory: apps/api
        run: |
          pnpm prisma generate
          pnpm prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
